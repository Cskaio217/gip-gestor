<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>GIP — Redirecionando...</title>
  <script>
    // Parte 1 do par spa-github-pages (rafgraph/spa-github-pages).
    // GitHub Pages devolve 404 para qualquer rota que não seja um arquivo real.
    // Este script recodifica o caminho como query string e redireciona para
    // index.html, onde o script de decode (Parte 2) restaura a URL original
    // antes do React carregar.
    //
    // pathSegmentsToKeep = 1 → mantém 1 segmento de path no prefix.
    // Aqui o repositório ocupa 1 segmento: /gip-gestor/
    var pathSegmentsToKeep = 1;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
